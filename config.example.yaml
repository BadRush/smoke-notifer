#
# NOTE: Telegram secrets (bot_token, chat_id) sekarang dikelola via
# file .env — lihat .env.example untuk template.
# Environment variables akan OVERRIDE nilai di file ini.

# ─── Telegram Bot ─────────────────────────────────────────────────
# Secrets dikelola via .env file:
#   SMOKE_TG_TOKEN    → bot_token
#   SMOKE_TG_CHAT_ID  → chat_id
#   SMOKE_TG_THREAD_ID → message_thread_id
telegram:
  bot_token: ""                        # akan di-override oleh .env file
  chat_id: ""                          # akan di-override oleh .env file
  # message_thread_id: 123             # (opsional) ID thread/topic di grup
                                       # Untuk grup dengan Topics enabled:
                                       #   1. Buka topic di Telegram Desktop/Web
                                       #   2. Lihat URL: https://t.me/c/xxxxx/123
                                       #                                     ^^^
                                       #   3. Angka terakhir = message_thread_id
                                       # Kosongkan jika kirim ke General topic atau chat biasa
  
  # ─── Command Listener (Interactive NOC) ───
  listen_commands: true             # Aktifkan fitur listener (/smoke-status, tombol inline)
  admin_users:                      # (Opsional) User ID Telegram Anda agar BISA mengabaikan batasan thread & chat
    # - "987654321"                 # Dapatkan User ID dari bot @userinfobot
  allowed_chat_ids:                 # (Opsional) Batasi bot HANYA merespons obrolan dari Chat ID ini.
    # - "-1001234567"               # Hindari orang luar/iseng menjalankan command bot.
    # - "123456789"

# ─── SmokePing Settings ──────────────────────────────────────────
smokeping:
  rrd_base_path: "/var/lib/smokeping"   # path root file .rrd
  check_interval: 60                     # polling interval (detik)
  num_probes: 20                         # default jumlah probe

# ─── Graph Settings ──────────────────────────────────────────────
# Graph PNG di-generate saat alert, dikirim bareng notif
graph:
  enabled: true
  duration: "3h"          # durasi graph alert: 1h, 3h, 6h, 12h, 24h
  width: 800              # lebar PNG (pixel)
  height: 250             # tinggi PNG (pixel)
  temp_dir: "/tmp/smoke-notifier"   # folder temp untuk PNG

# ─── Alert Settings ──────────────────────────────────────────────
alerts:
  delay:
    warn: 300             # detik — status harus stabil selama ini sebelum alert WARN dikirim
    crit: 0               # detik — langsung kirim alert CRIT tanpa ditunda
    down: 0               # detik — langsung kirim alert DOWN tanpa ditunda
    ok: 0                 # detik — langsung kirim notifikasi RECOVERED (OK)
  
  flapping:
    cooldown: 300         # detik — jeda minimum antar alert per link
    max_changes: 4        # jumlah state change dalam window = flapping
    window: 600           # detik — window untuk deteksi flapping

  rate_limit:
    max_per_minute: 20    # max pesan Telegram per menit

# ─── Daily Heartbeat ─────────────────────────────────────────────
# Summary harian agar tahu monitor masih hidup
heartbeat:
  enabled: true
  time: "07:00"           # jam kirim heartbeat (HH:MM, format 24h)
  graph_duration: "24h"   # durasi graph untuk heartbeat

# ─── Logging ──────────────────────────────────────────────────────
logging:
  file: "/opt/smoke-notifier/smoke-notifier.log"
  max_size_mb: 5          # max ukuran file log sebelum rotate
  backup_count: 3         # jumlah backup log yang disimpan

# ─── State Persistence ───────────────────────────────────────────
state_file: "/opt/smoke-notifier/state.json"

# ─── Link Definitions ────────────────────────────────────────────
# Definisi setiap link yang dipantau.
# Threshold per-link:
#   warn_rtt    : RTT (ms) >= ini → WARNING
#   crit_rtt    : RTT (ms) >= ini → CRITICAL
#   warn_loss   : Packet loss (%) >= ini → WARNING
#   crit_loss   : Packet loss (%) >= ini → CRITICAL
#   warn_jitter : Jitter/SD (ms) >= ini → WARNING  (opsional)
#   crit_jitter : Jitter/SD (ms) >= ini → CRITICAL (opsional)
#   num_probes  : jumlah probe (override default smokeping.num_probes)
#   depends_on  : list of parent links (opsional). Jika parent bermasalah (CRIT/DOWN),
#                 alert untuk link ini akan didiamkan (suppressed) menjadi UNREACHABLE.
#   chat_id     : (opsional) kirim alert link ini ke grup khusus (override default).
#   message_thread_id : (opsional) ID thread/topik untuk link ini.
#
# rrd_path relatif dari smokeping.rrd_base_path

links:
  - label: "Upstream-A (ISP-1)"
    rrd_path: "Upstream/ISP-1.rrd"
    warn_rtt: 30
    crit_rtt: 80
    warn_loss: 5
    crit_loss: 20
    warn_jitter: 10
    crit_jitter: 30
    num_probes: 20

  - label: "Upstream-B (ISP-2)"
    rrd_path: "Upstream/ISP-2.rrd"
    warn_rtt: 20
    crit_rtt: 60
    warn_loss: 5
    crit_loss: 20
    num_probes: 20

  - label: "Backbone JKT-SBY"
    rrd_path: "Backbone/JKT-SBY.rrd"
    warn_rtt: 5
    crit_rtt: 15
    warn_loss: 2
    crit_loss: 10
    warn_jitter: 3
    crit_jitter: 8
    num_probes: 20
    depends_on:
      - "Upstream-A (ISP-1)"

  # ─── Tambah link lain di bawah sini ───
  # - label: "Customer VIP"
  #   rrd_path: "Customer/Cust-VIP.rrd"
